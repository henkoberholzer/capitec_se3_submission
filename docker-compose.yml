services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: sds-keycloak
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_PORT}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: "http://keycloak:8080"
      KC_HOSTNAME_ADMIN: "http://localhost:${KEYCLOAK_PORT}"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      JAVA_OPTS_KC_HEAP: "-XX:MaxRAMPercentage=65 -XX:MinHeapFreeRatio=20 -XX:MaxHeapFreeRatio=30"
      SDS_DOWNLOAD_CLIENT_SECRET: ${SDS_DOWNLOAD_CLIENT_SECRET}
      SDS_SAMPLE_CLIENT_SECRET: ${SDS_SAMPLE_CLIENT_SECRET}
    mem_limit: 1g
    volumes:
      - ./code/keycloak:/opt/keycloak/data/import

  postgres:
    image: postgres:17
    container_name: sds-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sds-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: sds-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
      mc mb --ignore-existing local/${MINIO_DOCUMENTS_BUCKET}
      mc mb --ignore-existing local/${MINIO_ARCHIVE_BUCKET}
      echo 'MinIO buckets created.'
      "
    restart: on-failure

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: sds-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "sds-local-kafka-cluster-01"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.9.0
    container_name: sds-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic document-archive-event --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic document-download-event --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic audit-s3-sink-dlq --partitions 1 --replication-factor 1
      echo 'Kafka topics created.'
      "
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sds-kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  management-service:
    build:
      context: ./code
      dockerfile: management-service/Dockerfile
    container_name: sds-management-service
    stop_grace_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_DOCUMENTS_BUCKET: ${MINIO_DOCUMENTS_BUCKET}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/secure-download-system
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/secure-download-system/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: sds-api
      DOWNLOAD_SERVICE_BASE_URL: ${DOWNLOAD_SERVICE_BASE_URL}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      OUTBOX_POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE}
      SERVER_PORT: ${MANAGEMENT_SERVICE_PORT}
    ports:
      - "${MANAGEMENT_SERVICE_PORT}:${MANAGEMENT_SERVICE_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${MANAGEMENT_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  download-service:
    build:
      context: ./code
      dockerfile: download-service/Dockerfile
    container_name: sds-download-service
    stop_grace_period: 40s
    depends_on:
      kafka:
        condition: service_healthy
      management-service:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_SERVICE_BASE_URL: http://management-service:${MANAGEMENT_SERVICE_PORT}
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/secure-download-system/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: sds-download-client
      KEYCLOAK_CLIENT_SECRET: ${SDS_DOWNLOAD_CLIENT_SECRET}
      SERVER_PORT: ${DOWNLOAD_SERVICE_PORT}
    ports:
      - "${DOWNLOAD_SERVICE_PORT}:${DOWNLOAD_SERVICE_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${DOWNLOAD_SERVICE_PORT}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  test-client:
    build:
      context: ./code/test-client
    container_name: sds-test-client
    ports:
      - "${TEST_CLIENT_PORT}:3000"
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: secure-download-system
      MANAGEMENT_SERVICE_URL: http://management-service:${MANAGEMENT_SERVICE_PORT}
      DEFAULT_CLIENT_ID: sds-sample-client
      DEFAULT_CLIENT_SECRET: ${SDS_SAMPLE_CLIENT_SECRET}
    depends_on:
      - management-service

  kafka-connect:
    build:
      context: ./code
      dockerfile: kafka-connect/Dockerfile
    container_name: sds-kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${KAFKA_CONNECT_PORT}:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: sds-kafka-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  kafka-connect-init:
    image: curlimages/curl:latest
    container_name: sds-kafka-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./code/kafka-connect/config:/config:ro
    entrypoint: ["/bin/sh", "-c", "curl -sf -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' -d @/config/audit-s3-sink.json && echo 'Connector registered.' || echo 'Connector may already exist, skipping.'"]
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: sds-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      management-service:
        condition: service_healthy
      download-service:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: sds-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

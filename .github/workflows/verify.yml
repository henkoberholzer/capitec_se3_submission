# Verification pipeline only — no registry push, no deploy.
# Proves: checkstyle + unit tests + Docker image build succeed for this commit.
# Release/run for the only environment (local) remains Docker Compose; see ADR-003.

name: verify

on:
  push:
    branches: [main]
  pull_request:

# GitHub is retiring Node 20 for JS actions (default → Node 24). Prefer actions
# that already target node24 (checkout@v5+, setup-java@v5+, etc.).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit-tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - management-service
          - download-service
    defaults:
      run:
        working-directory: code/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: code/${{ matrix.service }}/pom.xml

      # Zscaler CA import is only for local corporate proxies (Dockerfiles / run-unit-tests.sh).
      # GitHub-hosted runners cannot write system cacerts and do not need that CA.

      - name: Checkstyle + unit tests
        # validate phase runs checkstyle; test compiles and runs unit tests
        # Testcontainers ITs need Docker (available on ubuntu-latest)
        run: mvn -B test

  build-images:
    name: build-images
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build management-service image
        uses: docker/build-push-action@v6
        with:
          context: ./code
          file: ./code/management-service/Dockerfile
          push: false
          load: true
          tags: sds-management-service:ci
          cache-from: type=gha,scope=management-service
          cache-to: type=gha,mode=max,scope=management-service

      - name: Build download-service image
        uses: docker/build-push-action@v6
        with:
          context: ./code
          file: ./code/download-service/Dockerfile
          push: false
          load: true
          tags: sds-download-service:ci
          cache-from: type=gha,scope=download-service
          cache-to: type=gha,mode=max,scope=download-service

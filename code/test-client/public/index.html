<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SDS Management Service Test Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; font-size: 13px; background: #1a1a1a; color: #d4d4d4; padding: 16px; }
    h2 { font-size: 14px; color: #9cdcfe; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    section { background: #252526; border: 1px solid #3c3c3c; border-radius: 4px; padding: 14px; margin-bottom: 12px; }
    label { display: block; color: #9cdcfe; margin-bottom: 3px; font-size: 12px; }
    input, textarea, select { width: 100%; background: #1e1e1e; border: 1px solid #3c3c3c; color: #d4d4d4; padding: 6px 8px; border-radius: 3px; font-family: monospace; font-size: 12px; margin-bottom: 8px; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #007acc; }
    textarea { resize: vertical; min-height: 60px; }
    .row { display: grid; gap: 10px; }
    .col-2 { grid-template-columns: 1fr 1fr; }
    .col-3 { grid-template-columns: 1fr 1fr 1fr; }
    button { background: #0e639c; color: white; border: none; padding: 6px 14px; border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 12px; }
    button:hover { background: #1177bb; }
    button:disabled { background: #3c3c3c; color: #666; cursor: not-allowed; }
    button.danger { background: #6c2020; }
    button.danger:hover { background: #8b2222; }
    .status { font-size: 11px; margin-top: 6px; padding: 4px 8px; border-radius: 3px; }
    .status.ok { background: #1a3a1a; color: #4ec94e; border: 1px solid #2d5a2d; }
    .status.err { background: #3a1a1a; color: #f44; border: 1px solid #5a2d2d; }
    .status.info { background: #1a2a3a; color: #9cdcfe; border: 1px solid #2d4a5a; }
    pre { background: #1e1e1e; border: 1px solid #3c3c3c; padding: 10px; border-radius: 3px; overflow: auto; max-height: 300px; font-size: 11px; color: #ce9178; white-space: pre-wrap; word-break: break-all; }
    .token-box { font-size: 10px; word-break: break-all; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #3c3c3c; color: #888; }
    .badge.active { background: #1a3a1a; color: #4ec94e; }
    .download-link { display: inline-block; margin-top: 8px; padding: 6px 12px; background: #3a3000; border: 1px solid #b8860b; border-radius: 3px; color: #ffd700; text-decoration: none; font-size: 11px; word-break: break-all; }
    .download-link:hover { background: #4a3e00; }
  </style>
</head>
<body>

<!-- ── Token ─────────────────────────────────────────────────────────────── -->
<section>
  <div class="section-header">
    <h2>1. Get Access Token</h2>
    <span id="tokenBadge" class="badge">no token</span>
  </div>
  <div class="row col-2">
    <div>
      <label>Client ID</label>
      <input id="clientId" type="text">
    </div>
    <div>
      <label>Client Secret</label>
      <input id="clientSecret" type="text">
    </div>
  </div>
  <button onclick="getToken()">Get Token</button>
  <div id="tokenStatus"></div>
  <div style="margin-top:8px">
    <label>Access Token</label>
    <textarea id="accessToken" class="token-box" rows="3" placeholder="token will appear here after successful authentication"></textarea>
  </div>
</section>

<!-- ── Upload ─────────────────────────────────────────────────────────────── -->
<section>
  <h2>2. Upload Document</h2>
  <div class="row col-3">
    <div>
      <label>PDF File</label>
      <input id="uploadFile" type="file" oninput="document.getElementById('fileName').textContent = this.files[0]?.name || ''" onchange="document.getElementById('fileName').textContent = this.files[0]?.name || ''">
      <span id="fileName" style="font-size:11px; color:#ce9178;"></span>
    </div>
    <div>
      <label>Max Downloads</label>
      <input id="maxDownloads" type="number" value="2" min="1">
    </div>
    <div>
      <label>Expires In (seconds)</label>
      <input id="expiresIn" type="number" value="60" min="1">
    </div>
  </div>
  <button onclick="uploadDocument()">Upload</button>
  <div id="uploadStatus"></div>
  <pre id="uploadResult" style="display:none"></pre>
  <div id="uploadDownloadLink"></div>
</section>

<!-- ── Document Detail ───────────────────────────────────────────────────── -->
<section>
  <h2>3. Get Document Detail</h2>
  <div class="row col-2">
    <div>
      <label>Document ID</label>
      <input id="getDocId" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
    </div>
    <div style="display:flex; align-items:flex-end; padding-bottom:8px">
      <button onclick="getDocument()">Get Document Details</button>
    </div>
  </div>
  <pre id="getDocResult" style="display:none"></pre>
  <div id="getDocDownloadLink"></div>
</section>

<!-- ── Revoke ─────────────────────────────────────────────────────────────── -->
<section>
  <h2>4. Revoke Document</h2>
  <div class="row col-2">
    <div>
      <label>Document ID</label>
      <input id="revokeDocId" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
    </div>
    <div style="display:flex; align-items:flex-end; padding-bottom:8px">
      <button class="danger" onclick="revokeDocument()">Revoke</button>
    </div>
  </div>
  <div id="revokeStatus"></div>
</section>

<script>
  let cfg = {};
  const downloadUrls = {};

  async function init() {
    cfg = await fetch('/config').then(r => r.json());
    document.getElementById('clientId').value = cfg.defaultClientId || '';
    document.getElementById('clientSecret').value = cfg.defaultClientSecret || '';
  }

  function apiUrl(path) {
    return `/proxy/api${path}`;
  }

  function token() {
    return document.getElementById('accessToken').value.trim();
  }

  function setStatus(id, msg, type) {
    document.getElementById(id).innerHTML = `<div class="status ${type}">${msg}</div>`;
  }

  function showJson(id, data) {
    const el = document.getElementById(id);
    el.style.display = 'block';
    el.textContent = JSON.stringify(data, null, 2);
  }

  function showDownloadLink(containerId, url) {
    const el = document.getElementById(containerId);
    if (url) {
      el.innerHTML = `<a class="download-link" href="${url}" target="_blank">&#8681; ${url}</a>`;
    } else {
      el.innerHTML = '';
    }
  }

  async function getToken() {
    const clientId = document.getElementById('clientId').value.trim();
    const clientSecret = document.getElementById('clientSecret').value.trim();
    setStatus('tokenStatus', 'Requesting token...', 'info');

    try {
      const res = await fetch('/proxy/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ client_id: clientId, client_secret: clientSecret }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setStatus('tokenStatus', `Error ${res.status}: ${data.error_description || data.error || res.statusText}`, 'err');
        document.getElementById('tokenBadge').textContent = 'no token';
        document.getElementById('tokenBadge').className = 'badge';
        return;
      }

      document.getElementById('accessToken').value = data.access_token;
      const exp = data.expires_in ? ` (expires in ${data.expires_in}s)` : '';
      setStatus('tokenStatus', `Token retrieved${exp}`, 'ok');
      document.getElementById('tokenBadge').textContent = 'token active';
      document.getElementById('tokenBadge').className = 'badge active';
    } catch (e) {
      setStatus('tokenStatus', `Network error: ${e.message}`, 'err');
    }
  }

  async function uploadDocument() {
    const file = document.getElementById('uploadFile').files[0];
    if (!file) { setStatus('uploadStatus', 'Select a PDF file', 'err'); return; }
    if (!token()) { setStatus('uploadStatus', 'Get a token first', 'err'); return; }

    setStatus('uploadStatus', 'Uploading...', 'info');
    document.getElementById('uploadResult').style.display = 'none';
    document.getElementById('uploadDownloadLink').innerHTML = '';

    try {
      const res = await fetch(apiUrl('/v1/documents'), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/pdf',
          'Authorization': `Bearer ${token()}`,
          'x-capitec-max-downloads': document.getElementById('maxDownloads').value,
          'x-capitec-expires-in': document.getElementById('expiresIn').value,
        },
        body: file,
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setStatus('uploadStatus', `Error ${res.status}: ${data.error || res.statusText}`, 'err');
      } else {
        setStatus('uploadStatus', `Uploaded — document ID: ${data.documentId}`, 'ok');
        document.getElementById('getDocId').value = data.documentId;
        document.getElementById('revokeDocId').value = data.documentId;
        if (data.documentId && data.downloadUrl) {
          downloadUrls[data.documentId] = data.downloadUrl;
        }
        showDownloadLink('uploadDownloadLink', data.downloadUrl);
      }
      showJson('uploadResult', data);
    } catch (e) {
      setStatus('uploadStatus', `Network error: ${e.message}`, 'err');
    }
  }

  async function getDocument() {
    const docId = document.getElementById('getDocId').value.trim();
    if (!docId || !token()) { return; }
    document.getElementById('getDocResult').style.display = 'none';
    document.getElementById('getDocDownloadLink').innerHTML = '';

    try {
      const res = await fetch(apiUrl(`/v1/documents/${docId}`), {
        headers: { 'Authorization': `Bearer ${token()}` },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const el = document.getElementById('getDocResult');
        el.style.display = 'block';
        el.textContent = `Error ${res.status}: ${data.error || res.statusText}`;
      } else {
        showDownloadLink('getDocDownloadLink', downloadUrls[docId] || null);
        showJson('getDocResult', data);
      }
    } catch (e) {
      const el = document.getElementById('getDocResult');
      el.style.display = 'block';
      el.textContent = `Network error: ${e.message}`;
    }
  }

  async function revokeDocument() {
    const docId = document.getElementById('revokeDocId').value.trim();
    if (!docId) { return; }
    if (!token()) { setStatus('revokeStatus', 'Get a token first', 'err'); return; }
    setStatus('revokeStatus', 'Revoking...', 'info');

    try {
      const res = await fetch(apiUrl(`/v1/documents/${docId}`), {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token()}` },
      });

      if (res.status === 204) {
        setStatus('revokeStatus', 'Document revoked', 'ok');
      } else {
        const data = await res.json().catch(() => ({}));
        setStatus('revokeStatus', `Error ${res.status}: ${data.error || res.statusText}`, 'err');
      }
    } catch (e) {
      setStatus('revokeStatus', `Network error: ${e.message}`, 'err');
    }
  }

  init();
</script>
</body>
</html>
